<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เลือกหน้าใช้งาน · TaemDee แต้มดี</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
</head>
<body>
  <div class="td role-picker-page">
    <div class="topbar"><span></span><span></span></div>

    <div class="rp-head">
      <div class="rp-brand">taemdee<span class="dot">.</span></div>
      <div class="rp-h">เข้าใช้งานเป็น</div>
      <div class="rp-sub">เครื่องนี้เปิดทั้ง 2 บัญชีไว้ — เลือกหน้าที่ต้องการได้เลย</div>
    </div>

    <div class="rp-tiles">
      <a class="rp-tile shop" href="/shop/dashboard">
        <div class="rp-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l1-5h16l1 5"/>
            <path d="M5 9v11a1 1 0 001 1h12a1 1 0 001-1V9"/>
            <path d="M3 9c0 1.66 1.34 3 3 3s3-1.34 3-3M9 9c0 1.66 1.34 3 3 3s3-1.34 3-3M15 9c0 1.66 1.34 3 3 3s3-1.34 3-3"/>
          </svg>
        </div>
        <div class="rp-info">
          <div class="rp-name">ร้านค้า</div>
          <div class="rp-meta">DeeBoard · ออกแต้ม · จัดการร้าน</div>
        </div>
        <span class="rp-arr">→</span>
      </a>

      <a class="rp-tile customer" href="/my-cards">
        <div class="rp-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="14" rx="3"/>
            <line x1="2" y1="11" x2="22" y2="11"/>
          </svg>
        </div>
        <div class="rp-info">
          <div class="rp-name">ลูกค้า</div>
          <div class="rp-meta">บัตรของพี่ · ของขวัญ · เก็บแต้ม</div>
        </div>
        <span class="rp-arr">→</span>
      </a>
    </div>

    {% include "_partials/footer_mark.html" %}
  </div>
</body>
</html>
