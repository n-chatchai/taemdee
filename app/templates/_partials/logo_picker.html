<div id="logo-picker-container" x-init="{% if picked_id %}choice = '{{ picked_id }}';{% endif %} {% if custom_text %}customText = '{{ custom_text }}';{% endif %}">
  <div class="s2-logos">
    {% for opt in options %}
      <button type="button" class="s2-logo" :class="{ selected: choice === '{{ opt.id }}' }"
              @click="choice = '{{ opt.id }}'; if(customText==='') customText='{{ opt.text }}'">
        <span class="{{ opt.css_class }}" 
              :contenteditable="choice === '{{ opt.id }}'" 
              @input="customText = $event.target.innerText"
              @blur="if(!customText.trim()) { customText = '{{ opt.text }}'; $event.target.innerText = '{{ opt.text }}'; }"
              @keydown.enter.prevent="$event.target.blur()">{{ opt.text }}{% if opt.show_dot %}<span class="dot" contenteditable="false">.</span>{% endif %}</span>
      </button>
    {% endfor %}
  </div>

  {% if saved_pick %}
    <div class="s2-logos" style="margin-top:8px;">
      <button type="button" class="s2-logo" :class="{ selected: choice === '{{ saved_pick.id }}' }"
              @click="choice = '{{ saved_pick.id }}'; if(customText==='') customText='{{ saved_pick.text }}'" title="ที่คุณเลือกไว้">
        <span class="{{ saved_pick.css_class }}"
              :contenteditable="choice === '{{ saved_pick.id }}'"
              @input="customText = $event.target.innerText"
              @blur="if(!customText.trim()) { customText = '{{ saved_pick.text }}'; $event.target.innerText = '{{ saved_pick.text }}'; }"
              @keydown.enter.prevent="$event.target.blur()">{{ saved_pick.text }}{% if saved_pick.show_dot %}<span class="dot" contenteditable="false">.</span>{% endif %}</span>
      </button>
    </div>
  {% endif %}

  <div class="s2-helper">
    AI สร้างจากชื่อ <em>"{{ shop_name or shop.name }}"</em> · แตะที่เลือกเพื่อแก้ข้อความ<br>
    <a href="?gen={{ next_gen }}" class="reroll">↻ สร้างใหม่อีก 3 แบบ</a>
  </div>
</div>
