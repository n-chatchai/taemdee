<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กู้คืนแต้ม · TaemDee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
</head>
<body>
  <div class="td c3">
    <div class="c3-bar">
      <a class="back" href="/my-cards" aria-label="ย้อนกลับ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="c3-title">กู้คืนแต้ม</div>
    </div>

    <form class="sheet" method="POST" action="/recover">
      <div class="headline">ใส่<em>รหัสกู้คืน</em></div>
      <div class="body-copy">รหัส 12 ตัวที่ผมให้พี่จดเอาไว้ตอนแรก — ใส่ลงไปแล้วผมจะดึงแต้มของพี่กลับมาให้ครับ</div>

      <input class="otp-input" type="text" inputmode="text" maxlength="14"
             name="code" placeholder="XXXX-XXXX-XXXX" autocapitalize="characters"
             autocorrect="off" spellcheck="false" required
             style="text-transform:uppercase; letter-spacing:0.04em; font-family:'JetBrains Mono', ui-monospace, monospace;">

      <button type="submit" class="btn btn-primary">
        กู้คืน
        <span class="arr">→</span>
      </button>

      {% if error %}
        <div class="trust" style="background:var(--accent-soft); color:var(--ink);">{{ error }}</div>
      {% endif %}
    </form>

    {% include "_partials/footer_mark.html" %}
  </div>
</body>
</html>
