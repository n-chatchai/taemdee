<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>{% block title %}Admin · TaemDee{% endblock %}</title>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
</head>
<body>
  <div class="td adm">
    <header class="adm-top">
      <a href="/admin/dashboard" class="adm-brand">
        <span class="adm-brand-num">A</span><span class="adm-brand-dot">.</span>
      </a>
      <nav class="adm-nav">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/shops">Shops</a>
        <a href="/admin/customers">Customers</a>
        <a href="/admin/topups">Topups</a>
        <a href="/admin/deereach">DeeReach</a>
      </nav>
      <form method="POST" action="/admin/logout" class="adm-logout-form">
        <button type="submit" class="adm-logout">ออก</button>
      </form>
    </header>

    <main class="adm-main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <style>
    .adm {
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .adm-top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .adm-brand {
      font-family: 'Host Grotesk', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.04em;
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      align-items: baseline;
    }
    .adm-brand-dot { color: var(--accent); margin-left: 1px; }
    .adm-nav {
      display: flex;
      gap: 18px;
      flex: 1;
      flex-wrap: wrap;
    }
    .adm-nav a {
      font-family: 'Prompt', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: var(--ink);
      text-decoration: none;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
    }
    .adm-nav a:hover { border-bottom-color: var(--accent); }
    .adm-logout-form { margin: 0; }
    .adm-logout {
      appearance: none;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 99px;
      padding: 5px 14px;
      font-family: 'Prompt', sans-serif;
      font-size: 12.5px;
      color: var(--ink-soft);
      cursor: pointer;
    }
    .adm-main { padding: 24px 22px 60px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    .adm-h {
      font-family: 'Prompt', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--ink);
      margin: 0 0 16px;
    }
    .adm-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .adm-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Prompt', sans-serif;
      font-size: 13px;
    }
    .adm-table th {
      text-align: left;
      padding: 8px 10px;
      font-weight: 700;
      color: var(--ink-soft);
      border-bottom: 1px solid var(--line);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .adm-table td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }
    .adm-table tr:last-child td { border-bottom: none; }
    .adm-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .adm-mini {
      font-size: 11px;
      color: var(--ink-softer);
    }
    .adm-btn {
      appearance: none;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 99px;
      padding: 6px 14px;
      font-family: 'Prompt', sans-serif;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
    .adm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .adm-stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 16px;
    }
    .adm-stat-label {
      font-family: 'Prompt', sans-serif;
      font-size: 12px;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .adm-stat-num {
      font-family: 'Host Grotesk', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .adm-pill {
      display: inline-flex;
      padding: 2px 9px;
      border-radius: 99px;
      font-family: 'Prompt', sans-serif;
      font-size: 11px;
      font-weight: 600;
      background: rgba(17,17,17,0.06);
      color: var(--ink);
    }
    .adm-pill.warn { background: var(--accent); color: #fff; }
    .adm-pill.ok   { background: rgba(111,168,130,0.18); color: var(--mint-ink, #2a4f44); }
  </style>
</body>
</html>
