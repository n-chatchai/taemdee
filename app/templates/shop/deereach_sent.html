<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ส่งสำเร็จ · {{ shop.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
</head>
<body>
  <div class="td">
    <div class="topbar"><span></span><span></span></div>

    <div class="app-bar">
      <a href="/shop/dashboard" class="x" aria-label="ปิด">×</a>
      <div class="title-mid"></div>
      <div class="placeholder"></div>
    </div>

    <div class="s13s-stage">
      <div class="s13s-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <div class="s13s-title">ส่ง<em>เรียบร้อย!</em></div>
      <div class="s13s-sub">ส่งให้ {{ campaign.audience_count }} คน · ใช้ {{ campaign.credits_spent }} เครดิต</div>

      <div class="s13s-card">
        <div class="s13s-row">
          <span class="s13s-label">เครดิตคงเหลือ</span>
          <span class="s13s-val">{{ shop.credit_balance }}</span>
        </div>
      </div>
    </div>

    <a class="s13s-cta" href="/shop/dashboard">
      <span>กลับแดชบอร์ด</span>
      <span class="arrow">→</span>
    </a>

    {% include "_partials/footer_mark.html" %}
  </div>
</body>
</html>
