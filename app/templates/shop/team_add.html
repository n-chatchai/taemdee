<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มพนักงาน · {{ shop.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
</head>
<body>
  <form method="POST" action="/shop/team/add" class="td">
    <div class="topbar"><span></span><span></span></div>

    <div class="app-bar">
      <a href="/shop/team" class="x" aria-label="ย้อนกลับ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="title-mid">เพิ่มพนักงาน</div>
      <div class="placeholder"></div>
    </div>

    <div class="s-staff-form">
      <div class="ssf-field">
        <div class="ssf-label">ชื่อเล่น</div>
        <input class="ssf-input" type="text" name="display_name" placeholder="เช่น น้องบี" required autofocus>
        <div class="ssf-helper">ลูกค้าจะเห็นชื่อนี้ใน feed · เปลี่ยนได้ทีหลัง</div>
      </div>

      <button type="submit" class="s2-cta-final" style="width:100%;">
        <span>สร้าง invite</span>
        <span class="arrow">→</span>
      </button>
    </div>

    {% include "_partials/footer_mark.html" %}
  </form>
</body>
</html>
