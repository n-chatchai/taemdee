{% extends "_layouts/s_base.html" %}
{% block title %}เพิ่มพนักงาน · {{ shop.name }} · TaemDee{% endblock %}

{% block content %}
  <form method="POST" action="/shop/team/add">
    <div class="app-bar">
      <a href="/shop/team" class="x" aria-label="ย้อนกลับ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="title-mid">เพิ่มพนักงาน</div>
      <div class="placeholder"></div>
    </div>

    <div class="s-staff-form">
      <div class="ssf-field">
        <div class="ssf-label">ชื่อเล่น</div>
        <input class="ssf-input" type="text" name="display_name" placeholder="เช่น น้องบี" required autofocus>
        <div class="ssf-helper">ลูกค้าจะเห็นชื่อนี้ใน feed · เปลี่ยนได้ทีหลัง</div>
      </div>

      <button type="submit" class="s2-cta-final" style="width:100%;">
        <span>สร้าง invite</span>
        <span class="arrow">→</span>
      </button>
    </div>
  </form>
{% endblock %}
