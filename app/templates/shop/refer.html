<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แนะนำเพื่อน · {{ shop.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="td">
    <div class="topbar"><span></span><span></span></div>

    <div class="app-bar">
      <a href="/shop/settings" class="x">←</a>
      <div class="title-mid">แนะนำเพื่อน</div>
      <div class="placeholder"></div>
    </div>

    <div class="page-title">
      <div class="h">แนะนำ<em>ร้านเพื่อน.</em></div>
      <div class="sub">ทั้งคุณและเพื่อนรับ 100 เครดิตฟรี เมื่อร้านเพื่อนสมัครเสร็จ</div>
    </div>

    <div class="s11-form">
      <label>ลิงก์ของคุณ</label>
      <input type="text" id="share" readonly value="{{ share_url }}">
      <button type="button" class="submit-btn" onclick="
        document.getElementById('share').select();
        navigator.clipboard.writeText('{{ share_url }}');
        this.textContent = 'คัดลอกแล้ว ✓';
        setTimeout(() => this.textContent = 'คัดลอกลิงก์', 2000);
      ">คัดลอกลิงก์</button>
    </div>

    <div class="s5-tip">
      <div class="tip-bulb">!</div>
      <div>ส่งลิงก์ผ่าน LINE หรือ SMS ให้เพื่อน — เมื่อพวกเขาตั้งค่าร้านเสร็จ ทั้งคุณและเขาได้ 100 เครดิตเลย</div>
    </div>
  </div>
</body>
</html>
