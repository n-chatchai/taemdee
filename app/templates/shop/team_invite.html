<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เชิญ {{ staff.display_name or 'พนักงาน' }} · {{ shop.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
</head>
<body>
  <div class="td">
    <div class="topbar"><span></span><span></span></div>

    <div class="app-bar">
      <a href="/shop/team" class="x" aria-label="ย้อนกลับ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="title-mid">เชิญพนักงาน</div>
      <div class="placeholder"></div>
    </div>

    <div class="ssi-stage">
      <div class="ssi-greet">เชิญ <em>{{ staff.display_name or 'พนักงาน' }}</em> เข้าร่วม</div>
      <div class="ssi-helper">ให้พนักงานเปิดมือถือ scan QR หรือกดลิงก์</div>

      <div class="ssi-qr-card">
        <div class="qr-svg">{{ qr_svg|safe }}</div>
        <div class="ssi-expire">หมดอายุใน <strong>{{ expire_label }}</strong></div>
      </div>

      <div class="ssi-share">
        <button type="button" class="ssi-share-btn" id="ssi-share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          ส่งลิงก์
        </button>
        <button type="button" class="ssi-share-btn secondary" id="ssi-copy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          คัดลอก
        </button>
      </div>
    </div>

    {% include "_partials/footer_mark.html" %}
  </div>

  <script>
    (function () {
      const url = {{ join_url|tojson }};
      document.getElementById('ssi-share').addEventListener('click', async () => {
        if (navigator.share) {
          try { await navigator.share({ title: 'เชิญเข้าร่วมร้าน · {{ shop.name }}', url: url }); } catch (_) {}
        } else {
          // No native share API — fall back to copy
          try { await navigator.clipboard.writeText(url); } catch (_) {}
        }
      });
      document.getElementById('ssi-copy').addEventListener('click', async () => {
        const btn = document.getElementById('ssi-copy');
        const orig = btn.innerHTML;
        try {
          await navigator.clipboard.writeText(url);
          btn.innerHTML = '✓ คัดลอกแล้ว';
          setTimeout(() => { btn.innerHTML = orig; }, 1600);
        } catch (_) {}
      });
    })();
  </script>
</body>
</html>
