<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลร้าน · TaemDee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <form method="POST" action="/shop/settings/identity" class="td"
        x-data="{
          choice: '{{ picked_id or options[0].id }}',
          customText: '{{ custom_text }}',
          isUploading: false,
          customLogoUrl: '{{ shop.logo_url if shop.logo_url.startswith('url:') else '' }}',
          async handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            this.isUploading = true;
            const formData = new FormData();
            formData.append('file', file);
            try {
              const res = await fetch('/shop/upload/logo', { method: 'POST', body: formData });
              const data = await res.json();
              if (data.url) {
                this.customLogoUrl = 'url:' + data.url;
                this.choice = 'url:' + data.url;
              }
            } catch (err) {
              console.error('Upload failed', err);
            } finally {
              this.isUploading = false;
            }
          }
        }">

    <div class="topbar"><span></span><span></span></div>

    <div class="app-bar">
      <a href="/shop/settings" class="x" aria-label="ย้อนกลับ">←</a>
      <div class="title-mid">ข้อมูลร้าน</div>
      <div class="placeholder"></div>
    </div>

    <div class="s2-q" style="padding: 12px 20px 16px;">
      <div class="ask">ข้อมูล<em>ร้านของคุณ.</em></div>
      <div class="sub">ลูกค้าจะเห็นชื่อและโลโก้นี้บนบัตรสะสมแต้ม</div>
    </div>

    <div class="s2-field">
      <label class="label" for="settings-name">ชื่อร้าน</label>
      <input id="settings-name" name="name" type="text" required
             class="s2-input"
             value="{{ shop.name }}"
             placeholder="เช่น ร้านกาแฟลุงหมี"
             hx-get="/shop/settings/identity/logos_partial"
             hx-target="#logo-picker-container"
             hx-swap="outerHTML"
             hx-trigger="keyup changed delay:500ms">
    </div>

    <div class="s2-field" style="margin-top:18px;">
      <div class="label">โลโก้</div>
    </div>

    {% include "_partials/logo_picker.html" %}

    <div class="s2-upload" @click="$refs.logoFileInput.click()" :class="{ uploading: isUploading }">
      <input type="file" x-ref="logoFileInput" @change="handleFileUpload" accept="image/*" style="display: none;">
      <template x-if="!isUploading">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </template>
      <template x-if="isUploading">
        <svg class="animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="16" />
        </svg>
      </template>
      <span x-text="isUploading ? 'กำลังอัปโหลด...' : 'ใช้โลโก้ของฉันเอง'"></span>
    </div>

    <template x-if="customLogoUrl">
      <div class="s2-logos" style="margin-top: 10px; grid-template-columns: repeat(1, 1fr);">
        <button type="button" class="s2-logo"
                :class="{ selected: choice === customLogoUrl }"
                @click="choice = customLogoUrl">
          <img :src="customLogoUrl.replace('url:', '')" style="object-fit: cover; width: 100%; height: 100%; border-radius: inherit;">
        </button>
      </div>
    </template>

    <input type="hidden" name="logo_choice" :value="choice">
    <input type="hidden" name="custom_text" :value="customText">

    <div class="s2-foot">
      <button type="submit" class="next" style="flex:1;">
        <span>บันทึก</span>
        <span class="arrow">→</span>
      </button>
    </div>

    {% include "_partials/footer_mark.html" %}
  </form>
</body>
</html>
