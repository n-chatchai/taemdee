<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เรื่องราวร้าน · TaemDee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% include "_partials/pwa_head.html" %}
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
</head>
<body>
  <form method="POST" action="/shop/settings/story" class="td">
    <div class="topbar"><span></span><span></span></div>

    <div class="app-bar">
      <a href="/shop/settings" class="x" aria-label="ย้อนกลับ">←</a>
      <div class="title-mid">เรื่องราวร้าน</div>
      <div class="placeholder"></div>
    </div>

    <div class="s2-q" style="padding: 12px 20px 16px;">
      <div class="ask">เล่าเรื่องราว<em>ร้านคุณ.</em></div>
      <div class="sub">ลูกค้าจะอ่านที่หน้า "ทำความรู้จัก" — เน้นความรู้สึก ไม่ใช่ขายของ</div>
    </div>

    <div class="s2-field">
      <label class="label" for="settings-thanks">ข้อความขอบคุณ</label>
      <textarea id="settings-thanks" name="thanks_message" rows="2" maxlength="200"
                class="s2-input" style="resize:vertical; min-height:54px; padding:10px 12px; font-family:'Prompt',sans-serif;"
                placeholder="เช่น ดีใจที่กลับมาทุกครั้ง · ทางร้านฝากบอก">{{ shop.thanks_message or '' }}</textarea>
      <div style="font-size:11px; color:var(--ink-softer); margin-top:4px;">สั้นๆ 1–2 บรรทัด · จะปรากฏข้างๆ น้องแต้ม</div>
    </div>

    <div class="s2-field" style="margin-top:18px;">
      <label class="label" for="settings-story">เรื่องราวของร้าน</label>
      <textarea id="settings-story" name="story_text" rows="6" maxlength="800"
                class="s2-input" style="resize:vertical; min-height:140px; padding:10px 12px; font-family:'Prompt',sans-serif;"
                placeholder="เช่น ร้านกาแฟลุงหมีเริ่มจากความหลงใหลในกาแฟดอยช้าง — เริ่มเปิดที่บ้านก่อนย้ายมานิมมาน · ทุกแก้วคั่วเองทุกวัน">{{ shop.story_text or '' }}</textarea>
      <div style="font-size:11px; color:var(--ink-softer); margin-top:4px;">เล่าให้เห็นภาพ · ไม่ต้องยาวมาก</div>
    </div>

    <div class="s2-foot">
      <button type="submit" class="next" style="flex:1;">
        <span>บันทึก</span>
        <span class="arrow">→</span>
      </button>
    </div>

    {% include "_partials/footer_mark.html" %}
  </form>
</body>
</html>
