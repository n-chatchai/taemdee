<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าร้าน · 1/4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <form method="POST" action="/shop/onboard/name" class="td"
        x-data="{ goal: {{ shop.reward_threshold }} }">
    <div class="td-badge">
      <svg class="s" viewBox="0 0 20 12" fill="none">
        <circle cx="5" cy="3" r="1.5" fill="currentColor"/>
        <circle cx="15" cy="3" r="1.5" fill="currentColor"/>
        <path d="M4 7 Q10 11 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      TAEMDEE
    </div>
    <div class="topbar"><span></span><span></span></div>

    <div class="s2-steps" style="margin-top:18px;">
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>

    <div class="s2-counter">
      <span class="step-num"><strong>01</strong> / 04 · ร้าน</span>
      <a href="/shop/onboard/logo" class="skip">ข้าม</a>
    </div>

    <div class="s2-q">
      <div class="ask">ตั้งค่า<em>ร้านของคุณ.</em></div>
      <div class="sub">ใช้เวลาประมาณ 1 นาที</div>
    </div>

    <div class="s2-field">
      <label class="label" for="onboard-name">ชื่อร้าน</label>
      <input id="onboard-name" name="name" type="text" required
             value="{% if shop.name not in ('ร้านใหม่', 'New Shop') %}{{ shop.name }}{% endif %}"
             placeholder="เช่น ร้านกาแฟลุงหมี"
             style="width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--ink);background:var(--surface);box-shadow:2px 2px 0 var(--ink);font:inherit;font-weight:600;font-size:16px;letter-spacing:-0.01em;color:var(--ink);">
      <div class="s2-hint">ลูกค้าจะเห็นชื่อนี้บนบัตรสะสมแต้ม</div>
    </div>

    <div class="s2-field">
      <label class="label" for="onboard-reward">รางวัลที่ลูกค้าจะได้รับ</label>
      <input id="onboard-reward" name="reward_description" type="text" required
             value="{% if shop.reward_description != 'Free Coffee' %}{{ shop.reward_description }}{% endif %}"
             placeholder="เช่น กาแฟ Signature ฟรี 1 แก้ว"
             style="width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--ink);background:var(--surface);box-shadow:2px 2px 0 var(--ink);font:inherit;font-weight:600;font-size:16px;letter-spacing:-0.01em;color:var(--ink);">
    </div>

    <div class="s2-field" style="margin-top:18px;">
      <div class="label">เก็บกี่แต้มถึงได้รางวัล</div>
    </div>
    <div class="s2-goal-pills">
      <button type="button" class="s2-goal-pill" :class="{ selected: goal === 8 }" @click="goal = 8">8</button>
      <button type="button" class="s2-goal-pill" :class="{ selected: goal === 10 }" @click="goal = 10">10</button>
      <button type="button" class="s2-goal-pill" :class="{ selected: goal === 15 }" @click="goal = 15">15</button>
    </div>
    <div class="s2-hint" style="margin: 8px 24px 0;">ส่วนใหญ่ใช้ 10 แต้ม กำลังพอดี</div>
    <input type="hidden" name="reward_threshold" :value="goal">

    <div class="s2-foot">
      <button type="submit" class="next" style="flex:1;">
        <span>ถัดไป · เลือกโลโก้</span>
        <span class="arrow">→</span>
      </button>
    </div>
  </form>
</body>
</html>
