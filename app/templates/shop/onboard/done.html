{% extends "_layouts/s_base.html" %}
{% block title %}เสร็จเรียบร้อย! · TaemDee{% endblock %}

{% block content %}
  <div class="s2-steps" style="margin-top:18px;">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
  </div>

  <div class="s2-counter">
    <span class="step-num"><strong>04</strong> / 04 · เสร็จ</span>
  </div>

  <div class="s2-done-hero">
    <svg class="confetti c1" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0 L9.5 6.5 L16 8 L9.5 9.5 L8 16 L6.5 9.5 L0 8 L6.5 6.5 Z"/></svg>
    <svg class="confetti c2" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0 L9.5 6.5 L16 8 L9.5 9.5 L8 16 L6.5 9.5 L0 8 L6.5 6.5 Z"/></svg>
    <svg class="confetti c3" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0 L9.5 6.5 L16 8 L9.5 9.5 L8 16 L6.5 9.5 L0 8 L6.5 6.5 Z"/></svg>
    <svg class="confetti c4" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0 L9.5 6.5 L16 8 L9.5 9.5 L8 16 L6.5 9.5 L0 8 L6.5 6.5 Z"/></svg>

    <div class="s2-done-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="s2-done-title"><em>พร้อมใช้งาน</em><br>แล้วครับ!</div>
    <div class="s2-done-sub">โหลด คิวอาร์ร้าน พิมพ์ติดที่เคาน์เตอร์</div>
  </div>

  <div class="s2-qr-block">
    <div class="s8-actions" style="display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 0;">
      <button type="button" class="pill" onclick="downloadQRCard('qr-card-unified', 'taemdee-card-{{ shop.name|slugify }}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>บันทึกรูป</span>
      </button>

      {% include "_partials/qr_card.html" with context %}
    </div>

    <div class="s2-qr-hint" style="margin-top: 16px;">ติดตั้งที่จุดที่ลูกค้าเห็นชัด</div>
  </div>

  <form method="POST" action="/shop/onboard/done" class="s2-onboard-form">
    <div class="s2-foot">
      <button type="submit" class="s2-cta-final" style="width:100%;">
        <span>ไปที่แดชบอร์ด</span>
        <span class="arrow">→</span>
      </button>
    </div>
  </form>
{% endblock %}
