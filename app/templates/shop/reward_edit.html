<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รางวัล · {{ shop.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  {% set picked_image = shop.reward_image or 'coffee_cup' %}
  <form method="POST" action="/shop/reward" class="td"
        x-data="{
          rewardImage: '{{ picked_image }}',
          goal: {{ shop.reward_threshold }},
          customOpen: {{ 'true' if shop.reward_threshold not in goals else 'false' }}
        }">
    <div class="topbar"><span></span><span></span></div>

    <div class="app-bar">
      <a href="/shop/settings" class="x" aria-label="ย้อนกลับ">←</a>
      <div class="title-mid">รางวัล</div>
      <div class="placeholder"></div>
    </div>

    <div class="s2-q">
      <div class="ask">ตั้ง<em>รางวัล.</em></div>
      <div class="sub">ลูกค้าได้อะไรเมื่อสะสมครบ</div>
    </div>

    <div class="s2-field">
      <label class="label" for="reward-desc">รางวัลที่ลูกค้าจะได้รับ</label>
      <input id="reward-desc" name="reward_description" type="text" required
             value="{% if shop.reward_description != 'Free Coffee' %}{{ shop.reward_description }}{% endif %}"
             placeholder="เช่น กาแฟ Signature ฟรี 1 แก้ว"
             style="width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--ink);background:var(--surface);box-shadow:2px 2px 0 var(--ink);font:inherit;font-weight:600;font-size:16px;letter-spacing:-0.01em;color:var(--ink);">
    </div>

    <div class="s2-field" style="margin-top:14px;">
      <div class="label">รูปรางวัล</div>
    </div>

    <div class="s2-rewards">
      {% for img_id in reward_images %}
        <button type="button" class="s2-reward" :class="{ selected: rewardImage === '{{ img_id }}' }" @click="rewardImage = '{{ img_id }}'">
          <div class="reward-img r-{{ img_id|replace('_','-') }}"></div>
        </button>
      {% endfor %}
    </div>

    <div class="s2-field" style="margin-top:18px;">
      <div class="label">เก็บกี่แต้มถึงได้รางวัล</div>
    </div>
    <div class="s2-goal-pills">
      {% for g in goals %}
        <button type="button" class="s2-goal-pill" :class="{ selected: goal === {{ g }} && !customOpen }" @click="goal = {{ g }}; customOpen = false">{{ g }}</button>
      {% endfor %}
      <button type="button" class="s2-goal-pill custom" :class="{ selected: customOpen }" @click="customOpen = !customOpen">
        <span class="plus">+</span>
        <span>กำหนดเอง</span>
      </button>
    </div>
    <div x-show="customOpen" x-cloak style="margin: 10px 20px 0;">
      <input type="number" min="1" max="99" x-model.number="goal"
             placeholder="จำนวนแต้ม"
             style="width:100%;padding:12px 14px;border-radius:12px;border:1.5px dashed var(--ink);background:var(--surface);font:inherit;font-weight:600;font-size:14px;text-align:center;">
    </div>
    <div class="s2-hint" style="margin: 8px 24px 0;">ส่วนใหญ่ใช้ 10 แต้ม กำลังพอดี</div>

    <input type="hidden" name="reward_image" :value="rewardImage">
    <input type="hidden" name="reward_threshold" :value="goal">

    <div class="s2-foot">
      <button type="submit" class="next" style="flex:1;">
        <span>บันทึก</span>
        <span class="arrow">✓</span>
      </button>
    </div>

    {% include "_partials/footer_mark.html" %}
  </form>
</body>
</html>
